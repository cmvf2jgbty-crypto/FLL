<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLL 2025-2026 场地赛积分表</title>
    <style>
        :root {
            --bg-light: #f0f0f0;
            --bg-white: #ffffff;
            --border-gray: #cccccc;
            --text-dark: #333333;
            --text-medium: #666666;
            --text-light: #999999;
            --accent-dark: #222222;
            --accent-medium: #555555;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; }
        
        body {
            background: var(--bg-light);
            color: var(--text-dark);
            padding: 20px;
            background-image: radial-gradient(var(--text-light) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--bg-white);
            border-radius: 12px;
            box-shadow: 0 10px 30px var(--shadow);
            overflow: hidden;
            border: 2px solid var(--accent-dark);
        }

        header {
            background: var(--accent-dark);
            color: white;
            padding: 25px;
            text-align: center;
            border-bottom: 5px solid var(--accent-medium);
        }

        h1 { margin: 0; font-size: 2.2em; letter-spacing: 1px; }
        .subtitle { opacity: 0.8; margin-top: 8px; font-style: italic; font-size: 1.1em; }

        .content { padding: 25px; }

        /* 顶部区域：计时器 + 检录 */
        .top-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .top-section { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--bg-white);
            border-radius: 8px;
            padding: 20px;
            border-left: 5px solid var(--accent-dark);
            border: 1px solid var(--border-gray);
        }

        .card h3 { margin-top: 0; color: var(--accent-dark); border-bottom: 2px solid #eee; padding-bottom: 10px; }

        /* 计时器样式 */
        .timer-container { text-align: center; }
        #timerDisplay {
            font-size: 4em;
            font-weight: bold;
            color: var(--accent-dark);
            text-shadow: 2px 2px 4px var(--shadow);
            margin: 10px 0;
        }
        .timer-controls { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .timer-btn {
            padding: 8px 16px;
            border: 2px solid var(--accent-dark);
            background: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 0.9em;
            font-weight: bold;
            color: var(--accent-dark);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .timer-btn:hover { background: var(--accent-dark); color: white; transform: scale(1.1); }

        /* 器材检录 */
        .inspection-card { border-left-color: var(--accent-medium); background: #f9f9f9; }
        .inspection-list { list-style: none; padding: 0; }
        .inspection-list li { margin: 10px 0; display: flex; align-items: center; }
        .inspection-list input { width: 18px; height: 18px; margin-right: 10px; accent-color: var(--accent-dark); }

        /* 任务网格 */
        .missions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 15px;
            margin: 25px 0;
        }

        .mission-card {
            background: white;
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px var(--shadow);
            transition: 0.3s;
        }

        .mission-card:hover { border-color: var(--accent-dark); transform: translateY(-2px); }
        .mission-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .mission-id { font-weight: bold; color: var(--accent-dark); }
        .mission-max { background: var(--accent-dark); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.9em; }
        .mission-rules { font-size: 0.85em; color: var(--text-medium); margin: 8px 0 12px; line-height: 1.4; }
        
        /* 按钮计分样式 - 小圆形 */
        .score-buttons { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            margin-top: 10px; 
        }
        .score-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--border-gray);
            background: white;
            font-size: 0.75em;
            font-weight: bold;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .score-btn:hover { border-color: var(--accent-dark); }
        .score-btn.selected {
            background: var(--accent-dark);
            color: white;
            border-color: var(--accent-dark);
        }
        .current-score {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--accent-dark);
            text-align: right;
            margin-top: 10px;
        }

        /* 精准度奖励 - 小圆形 */
        .bonus-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--accent-medium);
            margin: 25px 0;
            border: 1px solid var(--border-gray);
        }
        .bonus-options { 
            display: flex; 
            flex-wrap: wrap;
            gap: 15px; 
            margin-top: 15px; 
        }
        .bonus-option { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .bonus-option input[type="radio"] {
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border-gray);
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0;
        }
        .bonus-option input[type="radio"]:checked {
            background: var(--accent-dark);
            border-color: var(--accent-dark);
        }
        .bonus-option input[type="radio"]:hover {
            border-color: var(--accent-dark);
        }
        .bonus-option label {
            font-size: 0.9em;
            cursor: pointer;
            color: var(--text-dark);
        }

        /* 总分区域 */
        .total-section {
            text-align: center;
            padding: 30px;
            background: var(--accent-dark);
            color: white;
            border-radius: 12px;
            margin-top: 20px;
        }

        #totalScore { font-size: 4em; font-weight: bold; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .score-breakdown { display: flex; justify-content: center; gap: 30px; margin: 15px 0; flex-wrap: wrap; }
        
        .buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .action-btn { 
            padding: 10px 20px; 
            border: 2px solid var(--accent-dark); 
            background: white; 
            color: var(--accent-dark); 
            border-radius: 20px; 
            font-size: 1em; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .action-btn:hover { background: var(--accent-dark); color: white; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏺 FLL 2025-2026 场地赛积分表</h1>
        <p class="subtitle">UNEARTHED (重见天日) - 最终版</p>
    </header>

    <div class="content">
        <!-- 顶部区域：计时器 + 检录 -->
        <div class="top-section">
            <!-- 计时器 -->
            <div class="card timer-container">
                <h3>⏱️ 比赛计时器 (2分30秒)</h3>
                <div id="timerDisplay">02:30</div>
                <div class="timer-controls">
                    <button class="timer-btn" onclick="startTimer()">▶️</button>
                    <button class="timer-btn" onclick="pauseTimer()">⏸️</button>
                    <button class="timer-btn" onclick="resetTimer()">🔄</button>
                </div>
            </div>

            <!-- 器材检录 -->
            <div class="card inspection-card">
                <h3>🔧 器材检录（20分）</h3>
                <p style="font-size: 0.9em; color: var(--text-medium); margin-bottom: 15px;">
                    规则：机器人和所有器材完全放入一个出发区，高度&lt;305mm
                </p>
                <ul class="inspection-list">
                    <li>
                        <input type="checkbox" id="inspectEquipment" onchange="calculateScore()">
                        <label for="inspectEquipment">✅ 器材检录合格</label>
                    </li>
                </ul>
            </div>
        </div>

        <!-- 15个任务 -->
        <h3 style="color: var(--accent-dark); margin: 25px 0 15px;">🎯 场地任务计分（点击小圆点得分）</h3>
        <div class="missions-grid" id="missionContainer"></div>

        <!-- 精准度奖励 -->
        <div class="bonus-section">
            <h3 style="margin-top: 0; color: var(--accent-medium);">🎖️ 精准度奖励（按剩余徽章数）</h3>
            <div class="bonus-options">
                <div class="bonus-option">
                    <input type="radio" id="bonus50" name="accuracyBonus" value="50" onchange="calculateScore()">
                    <label for="bonus50">6/5个（50分）</label>
                </div>
                <div class="bonus-option">
                    <input type="radio" id="bonus35" name="accuracyBonus" value="35" onchange="calculateScore()">
                    <label for="bonus35">4个（35分）</label>
                </div>
                <div class="bonus-option">
                    <input type="radio" id="bonus25" name="accuracyBonus" value="25" onchange="calculateScore()">
                    <label for="bonus25">3个（25分）</label>
                </div>
                <div class="bonus-option">
                    <input type="radio" id="bonus15" name="accuracyBonus" value="15" onchange="calculateScore()">
                    <label for="bonus15">2个（15分）</label>
                </div>
                <div class="bonus-option">
                    <input type="radio" id="bonus10" name="accuracyBonus" value="10" onchange="calculateScore()">
                    <label for="bonus10">1个（10分）</label>
                </div>
                <div class="bonus-option">
                    <input type="radio" id="bonus0" name="accuracyBonus" value="0" checked onchange="calculateScore()">
                    <label for="bonus0">0个（0分）</label>
                </div>
            </div>
        </div>

        <!-- 总分显示 -->
        <div class="total-section">
            <h2>🏆 当前总分</h2>
            <div id="totalScore">0</div>
            <div class="score-breakdown">
                <span>任务总分: <strong id="missionScore">0</strong></span>
                <span>器材检录: <strong id="inspectScore">0</strong></span>
                <span>精准奖励: <strong id="bonusScore">0</strong></span>
                <span>理论满分: 545分</span>
            </div>
            <div class="buttons">
                <button class="action-btn" onclick="calculateScore()">🔄 计算总分</button>
                <button class="action-btn" onclick="resetAll()">🔄 重置全部</button>
                <button class="action-btn" onclick="exportData()">📋 导出数据</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ⭐ 核心任务配置（最终修正版）
    const missions = [
        { 
            id: 1, 
            name: "清理表面", 
            buttons: [10, 10, 10], // ✅ 修正：3个10分
            rules: "你需要特殊工具来清洁和挖掘埋在地下的文物，确保文物完好无损。用刷子清除沉积物，揭开远古文明的神秘面纱。<br>• 完全清除沉积物，并且沉积物接触场地地图。 每个 10分<br>• 考古学家的刷子未接触挖掘点。 10分"
        },
        { 
            id: 2, 
            name: "揭秘地图", 
            buttons: [10, 10, 10], 
            rules: "考古学家们努力发掘重要线索，寻找古代文明的痕迹。移走并清除表层土，揭开隐藏地图。<br>• 完全清除表层土。 每个 10分"
        },
        { 
            id: 3, 
            name: "探索竖井", 
            buttons: [30, 10], 
            rules: "考古学家的任务是探索挖掘点的秘密并与队友分享。<br>• 你们的矿车在对侧的场地上。 30分<br>• 对面的矿车在我方的场地上。 加 10分<br>注：本任务中，矿车必须完全通过竖井入口才能得分。如果没有对手或是远程竞赛，将无法获得奖励。"
        },
        { 
            id: 4, 
            name: "小心发掘", 
            buttons: [30, 10], 
            rules: "在挖掘现场，有些地方非常危险，借助技术可以确保文物发掘的安全。小心地从坑穴中取出珍贵文物，确保挖掘现场井然有序。<br>• 珍贵文物完全不再接触矿坑。 30分<br>• 两个支撑结构均保持直立的原状。 10分"
        },
        { 
            id: 5, 
            name: "远古村庄", 
            buttons: [30], 
            rules: "重建房屋结构，使古老村庄恢复原貌。<br>• 完全复原房屋（使之整体完全水平）。 30分"
        },
        { 
            id: 6, 
            name: "神秘熔炉", 
            buttons: [10, 10, 10], 
            rules: "考古队认为，这个熔炉是用来冶炼矿石和制作工具的。取下矿石并认真寻找，有一块矿石里面藏着一件神秘文物，等待着你去发现。<br>• 矿石完全不再接触熔炉。 每个 10分<br>• 技术队员可以在矿石完全回到返回区后，用手将其打开并找出里面的化石文物（见任务14）。"
        },
        { 
            id: 7, 
            name: "搬运磨盘", 
            buttons: [30], 
            rules: "这个磨盘用来加工谷物，可以使我们了解古人的日常生活。因为又大又重，移动它可能是个挑战。<br>• 磨盘完全不再接触底座。 30分"
        },
        { 
            id: 8, 
            name: "筒仓", 
            buttons: [10, 10, 10], 
            rules: "将筒仓中保存的食物全部取出，送到实验室分析。<br>• 将保存的食物取出筒仓。 每个 10分<br>右侧任务模块"
        },
        { 
            id: 9, 
            name: "重建市集", 
            buttons: [20, 10], 
            rules: "复原市场摊位，看看当时村庄的市场上都卖些什么东西。<br>• 屋顶完全升起。 20分<br>• 市场中的摊位完全升起。 加 10分"
        },
        { 
            id: 10, 
            name: "倾斜天平", 
            buttons: [20, 10], 
            rules: "这个古老的工具用来确保每件物品都能公平买卖。<br>• 倾斜天平是在空中的开盒最终接触地面。 20分<br>• 完全取出藏在天平下的秤盘。 10分"
        },
        { 
            id: 11, 
            name: "文物起吊", 
            buttons: [20, 10], 
            rules: "你的考古队在港口发现了一些有趣的文物。你计划使用吊车帮助搬运。<br>• 将文物吊起，完全不再接触挖掘现场。 20分<br>真题：吊车标记至少部分降下（离开初始位置） 加 10分"
        },
        { 
            id: 12, 
            name: "打捞沉船", 
            buttons: [20, 10], 
            rules: "在沙漠发现一艘古沉船，摇摇欲坠。在不破坏沉船结构的情况下，打捞沉船。<br>• 完全清除沙子。 20分<br>• 沉船被完全打捞出并抬起。 10分<br>当红色船身杆被推出并完全越过右侧的黑线，视为沙子被完全清除。"
        },
        { 
            id: 13, 
            name: "重塑雕像", 
            buttons: [30], 
            rules: "重塑雕像，使雕像再现往日风采。<br>• 将雕像完全复原。 30分"
        },
        { 
            id: 14, 
            name: "临时展区", 
            buttons: [5, 5, 5, 5, 5, 5, 5], 
            rules: "将文物送往临时展区并进行展示。思考你从这些文物中了解了什么，还有哪些未解之谜。<br>文物接触场地地图并且至少部分位于目标区域内：<br>• 刷子 / 表层土 / 珍贵文物 / 对侧的矿车 / 化石矿 / 磨盘 / 秤盘 每个 5分"
        },
        { 
            id: 15, 
            name: "放置标识旗", 
            buttons: [10, 10, 10], 
            rules: "挖掘现场还有很多地方等待探索。使用标识旗标出需要进一步探索的地方。<br>• 标识旗至少部分位于指定区域内并接触场地地图。 每个 10分<br>相关描述请参见场地地图注释。"
        }
    ];

    // ⏱️ 计时器逻辑
    let timerInterval;
    let timeLeft = 150;

    function updateTimerDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = 
            `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                alert("⏰ 时间到！比赛结束！");
            }
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    function resetTimer() {
        pauseTimer();
        timeLeft = 150;
        updateTimerDisplay();
    }

    // 🎯 任务渲染与计分
    function renderMissions() {
        const container = document.getElementById('missionContainer');
        container.innerHTML = '';
        
        missions.forEach(mission => {
            const card = document.createElement('div');
            card.className = 'mission-card';
            card.id = `mission-card-${mission.id}`;
            
            let buttonsHtml = '';
            mission.buttons.forEach((value, index) => {
                buttonsHtml += `<button type="button" class="score-btn" id="btn-${mission.id}-${index}" onclick="toggleScore(${mission.id}, ${index}, ${value})">${value}</button>`;
            });

            const maxScore = mission.buttons.reduce((a,b) => a+b, 0);
            card.innerHTML = `
                <div class="mission-header">
                    <span class="mission-id">任务 ${mission.id}</span>
                    <span class="mission-max">最高 ${maxScore} 分</span>
                </div>
                <div class="mission-name" style="font-weight: 600; margin: 8px 0;">${mission.name}</div>
                <div class="mission-rules">${mission.rules}</div>
                <div class="score-buttons">${buttonsHtml}</div>
                <div class="current-score" id="score-${mission.id}">0 分</div>
            `;
            container.appendChild(card);
        });
    }

    function toggleScore(missionId, btnIndex, value) {
        const btn = document.getElementById(`btn-${missionId}-${btnIndex}`);
        btn.classList.toggle('selected');
        calculateMissionScore(missionId);
    }

    function calculateMissionScore(missionId) {
        const mission = missions.find(m => m.id === missionId);
        let total = 0;
        mission.buttons.forEach((value, index) => {
            const btn = document.getElementById(`btn-${missionId}-${index}`);
            if (btn.classList.contains('selected')) {
                total += value;
            }
        });
        document.getElementById(`score-${missionId}`).textContent = total + ' 分';
        calculateScore();
    }

    function calculateScore() {
        let missionTotal = 0;
        missions.forEach(mission => {
            mission.buttons.forEach((value, index) => {
                const btn = document.getElementById(`btn-${mission.id}-${index}`);
                if (btn && btn.classList.contains('selected')) {
                    missionTotal += value;
                }
            });
        });

        const inspectScore = document.getElementById('inspectEquipment').checked ? 20 : 0;
        const bonus = parseInt(document.querySelector('input[name="accuracyBonus"]:checked').value);
        
        document.getElementById('missionScore').textContent = missionTotal;
        document.getElementById('inspectScore').textContent = inspectScore;
        document.getElementById('bonusScore').textContent = bonus;
        document.getElementById('totalScore').textContent = missionTotal + inspectScore + bonus;
    }

    // 🔄 重置全部功能
    function resetAll() {
        if (confirm('确定要重置全部吗？这将清空所有分数、精准度奖励和器材检录状态，但不会重置计时器。')) {
            missions.forEach(mission => {
                mission.buttons.forEach((value, index) => {
                    const btn = document.getElementById(`btn-${mission.id}-${index}`);
                    if (btn) {
                        btn.classList.remove('selected');
                    }
                });
                const scoreDisplay = document.getElementById(`score-${mission.id}`);
                if (scoreDisplay) {
                    scoreDisplay.textContent = '0 分';
                }
            });
            
            document.getElementById('inspectEquipment').checked = false;
            document.getElementById('bonus0').checked = true;
            
            calculateScore();
        }
    }

    function exportData() {
        let data = `=== FLL 2025-2026 积分表 ===\n`;
        data += `比赛用时：${document.getElementById('timerDisplay').textContent}\n`;
        data += `器材检录：${document.getElementById('inspectEquipment').checked ? '合格（20分）' : '不合格（0分）'}\n`;
        data += `精准奖励：${document.querySelector('input[name="accuracyBonus"]:checked').nextElementSibling.textContent}\n\n`;
        
        missions.forEach(mission => {
            let missionScore = 0;
            mission.buttons.forEach((value, index) => {
                const btn = document.getElementById(`btn-${mission.id}-${index}`);
                if (btn && btn.classList.contains('selected')) {
                    missionScore += value;
                }
            });
            const maxScore = mission.buttons.reduce((a,b) => a+b, 0);
            data += `任务${mission.id}：${mission.name} → 得分：${missionScore}/${maxScore}分\n`;
        });
        
        data += `\n=== 总分 ===\n${document.getElementById('totalScore').textContent}分`;
        alert(data);
        navigator.clipboard.writeText(data).then(() => alert('数据已复制到剪贴板！'));
    }

    // 初始化
    window.onload = function() {
        renderMissions();
        updateTimerDisplay();
        calculateScore();
    };
</script>
</body>
</html>
